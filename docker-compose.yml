services:
  clipcash:
    build: .
    container_name: clipcash
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - clipcash
    restart: unless-stopped
